<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Adjisoft Portfolio Preview</title>
  <desc id="desc">Preview social image bergaya scrapbook cartoonist untuk portfolio Adjisoft.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff7eb" />
      <stop offset="55%" stop-color="#f5e4c6" />
      <stop offset="100%" stop-color="#efd3b0" />
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fffaf1" />
      <stop offset="100%" stop-color="#f8ecd7" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="20" flood-color="#72492f" flood-opacity="0.18" />
    </filter>
  </defs>

  <rect width="1200" height="630" rx="36" fill="url(#bg)" />
  <circle cx="155" cy="120" r="95" fill="#ffdba7" fill-opacity="0.55" />
  <circle cx="1048" cy="142" r="92" fill="#fff3da" fill-opacity="0.9" />

  <rect x="108" y="72" width="130" height="34" rx="6" transform="rotate(-8 108 72)" fill="#f4e0ae" fill-opacity="0.8" />
  <rect x="945" y="68" width="130" height="34" rx="6" transform="rotate(9 945 68)" fill="#f4e0ae" fill-opacity="0.8" />

  <g filter="url(#shadow)">
    <rect x="84" y="58" width="1032" height="514" rx="34" fill="url(#card)" stroke="#dcc7a4" stroke-width="3" />
    <rect x="104" y="78" width="992" height="474" rx="24" fill="none" stroke="#b98d63" stroke-opacity="0.3" stroke-dasharray="6 10" stroke-width="2" />
  </g>

  <text x="152" y="168" fill="#bd6238" font-family="'Plus Jakarta Sans', Arial, sans-serif" font-size="26" font-weight="800" letter-spacing="6">
    PORTFOLIO PERSONAL
  </text>
  <text x="148" y="285" fill="#2f241f" font-family="'Comic Sans MS', 'Trebuchet MS', cursive" font-size="118" font-weight="700">
    Adjisoft
  </text>
  <text x="154" y="350" fill="#6a4938" font-family="'Plus Jakarta Sans', Arial, sans-serif" font-size="34" font-weight="700">
    Vibe Coder, Programmer, dan Game Developer
  </text>
  <text x="154" y="414" fill="#48352c" font-family="'Plus Jakarta Sans', Arial, sans-serif" font-size="28">
    Membangun game, tools, dan eksperimen digital yang playful,
  </text>
  <text x="154" y="454" fill="#48352c" font-family="'Plus Jakarta Sans', Arial, sans-serif" font-size="28">
    rapi dipakai, dan tetap punya karakter kuat.
  </text>

  <g transform="translate(840 360) rotate(4)">
    <rect width="210" height="116" rx="22" fill="#fff6eb" stroke="#cda171" stroke-opacity="0.35" />
    <text x="28" y="40" fill="#bd6238" font-family="'Plus Jakarta Sans', Arial, sans-serif" font-size="18" font-weight="800" letter-spacing="2">
      LINKS
    </text>
    <text x="28" y="68" fill="#2f241f" font-family="'Plus Jakarta Sans', Arial, sans-serif" font-size="20" font-weight="700">
      github.com/adjisoft
    </text>
    <text x="28" y="95" fill="#5f473b" font-family="'Plus Jakarta Sans', Arial, sans-serif" font-size="18">
      t.me/adjisoft
    </text>
  </g>

  <circle cx="1010" cy="495" r="42" fill="#f0a96f" fill-opacity="0.62" />
  <circle cx="1072" cy="517" r="26" fill="#efc38e" fill-opacity="0.88" />
</svg>
